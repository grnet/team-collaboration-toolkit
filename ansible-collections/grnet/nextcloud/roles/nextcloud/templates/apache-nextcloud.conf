<IFModule mod_headers.c>
  Header always set Strict-Transport-Security "max-age=15552000; includeSubDomains"
</IFModule>

{% if nextcloud_install_notify_push %}
ProxyPass /push/ws ws://127.0.0.1:7867/ws
ProxyPass /push/ http://127.0.0.1:7867/
ProxyPassReverse /push/ http://127.0.0.1:7867/
{% endif %}

{% if nextcloud_appapi_harp_shared_key is defined %}
ProxyPass /exapps/ http://127.0.0.1:8780/exapps/
ProxyPassReverse /exapps/ http://127.0.0.1:8780/exapps/
ProxyTimeout 1800
{% endif %}

<Directory /var/www/{{ nextcloud_fqdn }}/nextcloud/>
  Require all granted
  AllowOverride All
  Options FollowSymLinks MultiViews
  <FilesMatch \.php$>
    SetHandler "proxy:unix:/var/run/php{{ php_version }}-fpm-nextcloud.sock|fcgi://localhost/"
  </FilesMatch>

  <IfModule mod_dav.c>
    Dav off
  </IfModule>
</Directory>
